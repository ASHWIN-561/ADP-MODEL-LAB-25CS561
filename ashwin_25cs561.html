<!DOCTYPE html>
<html>
<head>

</head>
<body>

    <h2>CLICK THE BUTTON </h2>

    <button id="btn">Click</button>

    <p id="message"></p>

    <script>
    
        const button = document.getElementById("btn");

        
        button.addEventListener("click", function() {
            document.getElementById("message").innerHTML = "Hello! THIS IS MY CODE...";
        });
    </script>

</body>
</html>
